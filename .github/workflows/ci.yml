name: CI

# Manual-only: the repo is private (Actions minutes are metered) and verification is
# local-first — local `npm run lint && npm run typecheck && npm test && npm run build`
# (plus screenshot UI checks) is the gate. Run this workflow on demand from the Actions
# tab if a clean-room CI check is ever wanted (e.g. before a release or if the repo goes public).
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
        env:
          # Placeholder values: pages that read Supabase are dynamic (use cookies()), so the
          # build never calls Supabase. These just satisfy client construction if referenced.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
